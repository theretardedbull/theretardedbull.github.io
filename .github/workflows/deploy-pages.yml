name: deploy-pages
on:
  push:
    branches: [main]
  schedule:
    - cron: "*/30 * * * *"   # self-heal: retry deploys through GitHub's bad spells
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
        timeout-minutes: 5
        continue-on-error: true   # GitHub Pages outages retry silently on the next cron — no alarm emails
