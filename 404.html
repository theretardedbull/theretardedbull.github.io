<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 — The Retarded Bull Gazette</title>
<link rel="icon" href="/bull-editor.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Old+Standard+TT:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@600&display=swap">
<style>
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{margin:0;min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 20%, #f7f0de 0%, #efe5cb 62%, #e7dab9 100%);color:#231d14;font-family:'Old Standard TT',Georgia,serif;text-align:center;padding:24px}
.notice{max-width:560px;border:3px double #231d14;padding:28px 24px;background:rgba(251,246,232,.5)}
h1{margin:0;font-size:clamp(30px,8vw,44px);font-weight:700;font-variant:small-caps;line-height:1.05}
p{font-size:15px;font-style:italic;line-height:1.6;margin:12px 0 20px}
a.stamp{display:inline-block;border:2.5px solid #7a1f1f;color:#7a1f1f;background:rgba(251,246,232,.9);padding:8px 18px;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:12px;letter-spacing:.16em;transform:rotate(-2deg);text-decoration:none}
a.stamp:hover{background:#7a1f1f;color:#f0e6cd}
</style>
</head>
<body>
<div class="notice">
  <h1>Page Not Found</h1>
  <p>This column hasn't been typeset. The presses are still arriving — the editor blames cigar break &#8470;4 of 9.</p>
  <a class="stamp" href="/">BACK TO THE FRONT PAGE</a>
</div>
</body>
</html>
