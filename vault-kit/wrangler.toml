name = "gazette-vault"
main = "worker.js"
compatibility_date = "2026-06-01"

[vars]
REPO = "theretardedbull/theretardedbull.github.io"
SITE_BASE = "https://theretardedbull.xyz"
# PUBLIC_BASE = ""   # set to a custom API domain later if wanted; defaults to the worker URL

# Optional image pipeline (screenshots) — uncomment to enable later:
# [[r2_buckets]]
# binding = "BUCKET"
# bucket_name = "rug-vault"

# secrets (set with: wrangler secret put <NAME>):
#   GH_TOKEN          — GitHub token, Contents: Read&Write on REPO (required)
#   SCREENSHOTONE_KEY — screenshotone.com access key (only for the optional image pipeline)
#   WAYBACK_KEYS      — optional "access:secret" from archive.org (authenticated Save Page Now)
